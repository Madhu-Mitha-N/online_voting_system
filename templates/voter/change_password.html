<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Change Password</title>

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/voter/change_password.css') }}">

</head>

<body>

<div class="password-container">

    <div class="password-card">

        <h1>Change Password</h1>

        <p>
            Please change your default password
        </p>

        <form id="changePasswordForm">

            <input
            type="password"
            id="newPassword"
            placeholder="Enter New Password"
            required>

            <button type="submit">

                Update Password

            </button>

        </form>

        <p id="message"></p>

    </div>

</div>

<script src="{{ url_for('static',
filename='js/voter/change_password.js') }}"></script>

</body>
</html>
