<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Candidate Management</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/admin/candidate_management.css') }}">
</head>

<body>

<div class="dashboard-container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="logo">Voting Admin</div>

        <ul>

            <li><a href="/admin/dashboard">Dashboard</a></li>

            <li><a href="/admin/voter-management">Voters</a></li>

            <li><a class="active" href="/admin/candidate-management">Candidates</a></li>

            <li><a href="/admin/employee-management">Employees</a></li>

        </ul>

        <a href="/admin/login-page" class="logout-btn">Logout</a>

    </div>

    <!-- MAIN -->
    <div class="main-content">

        <div class="page-header">

            <h1>Candidate Management</h1>

            <a href="/admin/add-candidate" class="add-btn">
                + Add Candidate
            </a>

        </div>

        <div class="search-box">
            <input id="searchInput" placeholder="Search candidate...">
        </div>

        <div class="table-container">

            <table>

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Party</th>
                        <th>Votes</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="candidateTableBody"></tbody>

            </table>

        </div>

    </div>

</div>

<script src="{{ url_for('static',
filename='js/admin/candidate_management.js') }}"></script>

</body>
</html>
