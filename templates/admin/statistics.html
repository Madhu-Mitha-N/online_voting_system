<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Statistics</title>

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/admin/statistics.css') }}">

    <!-- CHART JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="dashboard-container">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">
            Voting Admin
        </div>

        <ul>

            <li>
                <a href="/admin/dashboard">
                    Dashboard
                </a>
            </li>

            <li>
                <a href="/admin/voter-management">
                    Voters
                </a>
            </li>

            <li>
                <a href="/admin/candidate-management">
                    Candidates
                </a>
            </li>

            <li>
                <a href="/admin/employee-management">
                    Employees
                </a>
            </li>

            <li>
                <a href="/admin/assign-task">
                    Assign Tasks
                </a>
            </li>

            <li>
                <a class="active"
                href="/admin/statistics">

                    Statistics

                </a>
            </li>

        </ul>

        <a href="/admin/login-page"
        class="logout-btn">

            Logout

        </a>

    </div>

    <!-- MAIN -->

    <div class="main-content">

        <h1 class="page-title">
            Election Statistics
        </h1>

        <!-- CARDS -->

        <div class="cards">

            <div class="card">
                <h2>Total Voters</h2>
                <h3 id="totalVoters">0</h3>
            </div>

            <div class="card">
                <h2>Total Candidates</h2>
                <h3 id="totalCandidates">0</h3>
            </div>

            <div class="card">
                <h2>Total Employees</h2>
                <h3 id="totalEmployees">0</h3>
            </div>

            <div class="card">
                <h2>Total Votes</h2>
                <h3 id="totalVotes">0</h3>
            </div>

        </div>

        <!-- CHART -->

        <div class="chart-section">

            <h2>Voting Percentage</h2>

            <canvas id="voteChart"></canvas>

        </div>

        <!-- TABLES -->

        <div class="tables-container">

            <!-- CANDIDATE RANK -->

            <div class="table-box">

                <h2>Candidate Ranking</h2>

                <table>

                    <thead>

                        <tr>

                            <th>Name</th>
                            <th>Party</th>
                            <th>Votes</th>

                        </tr>

                    </thead>

                    <tbody id="rankingTable">

                    </tbody>

                </table>

            </div>

            <!-- TASK TABLE -->

            <div class="table-box">

                <h2>Task Status</h2>

                <table>

                    <thead>

                        <tr>

                            <th>Task</th>
                            <th>Employee</th>
                            <th>Status</th>

                        </tr>

                    </thead>

                    <tbody id="taskTable">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="{{ url_for('static',
filename='js/admin/statistics.js') }}"></script>

</body>

</html>
