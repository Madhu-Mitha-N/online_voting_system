<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Employee Dashboard</title>

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/employee/employee_dashboard.css') }}">

</head>

<body>

<div class="dashboard-container">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div>

            <div class="logo">
                Employee Panel
            </div>

            <ul>

                <li>
                    <a href="/employee/dashboard">
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="/employee/profile">
                        Profile
                    </a>
                </li>

            </ul>

        </div>

        <button id="logoutBtn"
        class="logout-btn">

            Logout

        </button>

    </div>

    <!-- MAIN -->

    <div class="main-content">

        <div class="top-bar">

            <h1>
                Welcome,
                <span id="employeeName"></span>
            </h1>

        </div>

        <div class="task-container">

            <h2>Your Tasks</h2>

            <table>

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Task</th>
                        <th>Status</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="taskTableBody"></tbody>

            </table>

        </div>

    </div>

</div>

<script src="{{ url_for('static',
filename='js/employee/employee_dashboard.js') }}"></script>

</body>
</html>
